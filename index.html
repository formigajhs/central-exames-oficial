<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Central de Exames</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
  border: none;
  border-radius: 6px;
}

.btn {
  background: #16a34a;
  color: white;
}

.btn2 {
  background: #2563eb;
  color: white;
}

table {
  width: 100%;
  margin-top: 20px;
  border-collapse: collapse;
}

td, th {
  padding: 10px;
  border: 1px solid #ddd;
}

</style>
</head>

<body>

<div class="container">
  <h2>Central de Exames</h2>

  <button class="btn" onclick="importar()">IMPORTAR EXAMES</button>
  <button class="btn2" onclick="carregar()">ATUALIZAR</button>

  <table>
    <thead>
      <tr>
        <th>Sigla</th>
        <th>Nome</th>
        <th>Código</th>
      </tr>
    </thead>
    <tbody id="tabela"></tbody>
  </table>
</div>

<script>

const supabaseClient = supabase.createClient(
  "https://kgznlatjntdwnzsrcmqp.supabase.co",
  "sb_publishable__ODBzBpNarobgI45tj5cGQ_A7AM4Qq3"
);

async function importar() {
  const exames = [
    { sigla: "HEMO", nome: "HEMOGRAMA COMPLETO", codigo: "11043202" },
    { sigla: "GLI", nome: "GLICOSE", codigo: "11011203" },
    { sigla: "TSH", nome: "TSH", codigo: "11053089" },
    { sigla: "CREAT", nome: "CREATININA", codigo: "11011149" },
    { sigla: "COLES", nome: "COLESTEROL TOTAL", codigo: "11011122" },
    { sigla: "HDL", nome: "HDL", codigo: "11013109" },
    { sigla: "LDL", nome: "LDL", codigo: "11013095" }
  ];

  const { error } = await supabaseClient.from("exames").insert(exames);

  if (error) {
    alert("Erro");
    console.log(error);
  } else {
    alert("Importado!");
    carregar();
  }
}

async function carregar() {
  const { data } = await supabaseClient.from("exames").select("*");

  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  data.forEach(e => {
    tabela.innerHTML += `
      <tr>
        <td>${e.sigla}</td>
        <td>${e.nome}</td>
        <td>${e.codigo}</td>
      </tr>
    `;
  });
}

carregar();

</script>

</body>
</html>
